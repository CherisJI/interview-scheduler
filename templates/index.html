<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自动约面系统 🗓️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tag { display:inline-flex;align-items:center;gap:4px;background:#fff1f2;color:#ff2442;
           border:1px solid #ffc9d0;border-radius:999px;padding:3px 12px;font-size:13px; }
    .tag .remove { cursor:pointer;font-size:15px;line-height:1;color:#ff2442;opacity:.7; }
    .tag .remove:hover { opacity:1; }
    .slot-card { transition:all .15s;cursor:pointer; }
    .slot-card.selected { background:#fff1f2;border-color:#ff2442;color:#ff2442; }
    .slot-card:hover:not(.selected) { border-color:#ffc9d0;background:#fffafb; }
    body { background:#f7f8fa; }
  </style>
</head>
<body class="min-h-screen">

<!-- 顶部导航 -->
<header class="bg-white border-b border-gray-100 sticky top-0 z-10">
  <div class="max-w-6xl mx-auto px-6 h-14 flex items-center gap-3">
    <span class="text-2xl">🗓️</span>
    <span class="font-semibold text-gray-800 text-lg">自动约面系统</span>
    <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full ml-1">MVP</span>
    <div class="flex-1"></div>
    <button onclick="showHistory()"
      class="text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1">
      📋 约面记录
    </button>
  </div>
</header>

<div class="max-w-6xl mx-auto px-6 py-8 flex gap-6">

  <!-- ── 左侧：输入表单 ── -->
  <div class="w-[420px] flex-shrink-0 space-y-4">

    <!-- 候选人信息 -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
        <span class="text-base">👤</span> 候选人信息
      </h3>
      <div class="space-y-3">
        <div>
          <label class="text-sm text-gray-500 mb-1 block">姓名 <span class="text-red-400">*</span></label>
          <input id="candidateName" type="text" placeholder="请输入候选人姓名"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-300 focus:ring-1 focus:ring-red-100" />
        </div>
        <div>
          <label class="text-sm text-gray-500 mb-1 block">邮箱 <span class="text-red-400">*</span></label>
          <input id="candidateEmail" type="email" placeholder="candidate@example.com"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-300 focus:ring-1 focus:ring-red-100" />
        </div>
        <div>
          <label class="text-sm text-gray-500 mb-1 block">招聘系统链接 <span class="text-gray-300">（选填）</span></label>
          <input id="candidateLink" type="url" placeholder="https://hr.xiaohongshu.com/..."
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-300 focus:ring-1 focus:ring-red-100" />
        </div>
      </div>
    </div>

    <!-- 面试官 -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
        <span class="text-base">🧑‍💼</span> 面试官
      </h3>
      <div id="interviewerTags" class="flex flex-wrap gap-2 mb-3 min-h-[28px]"></div>
      <input id="interviewerInput" type="text" placeholder="输入面试官姓名，按回车添加"
        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-300 focus:ring-1 focus:ring-red-100" />
      <p class="text-xs text-gray-400 mt-2">按回车 Enter 添加，支持多个面试官</p>
    </div>

    <!-- 面试设置 -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h3 class="font-semibold text-gray-800 mb-4 flex items-center gap-2">
        <span class="text-base">⚙️</span> 面试设置
      </h3>
      <div class="space-y-3">
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="text-sm text-gray-500 mb-1 block">时长</label>
            <select id="durationMin"
              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-300">
              <option value="30">30 分钟</option>
              <option value="45">45 分钟</option>
              <option value="60" selected>60 分钟</option>
              <option value="90">90 分钟</option>
            </select>
          </div>
          <div class="flex-1">
            <label class="text-sm text-gray-500 mb-1 block">形式</label>
            <select id="interviewType"
              class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-300">
              <option value="online">线上</option>
              <option value="offline">线下</option>
            </select>
          </div>
        </div>
        <div>
          <label class="text-sm text-gray-500 mb-1 block">时间范围</label>
          <select id="timeRange"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-300">
            <option value="this_week">本周</option>
            <option value="next_week" selected>下周</option>
            <option value="two_weeks">未来两周</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 查询按钮 -->
    <button id="queryBtn" onclick="queryAvailability()"
      class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 rounded-xl
             transition-colors flex items-center justify-center gap-2 text-sm">
      <span id="queryBtnIcon">🔍</span>
      <span id="queryBtnText">查询面试官空闲时间</span>
    </button>

  </div>

  <!-- ── 右侧：空闲时段 + 操作 ── -->
  <div class="flex-1 space-y-4">

    <!-- 占位提示 -->
    <div id="emptyState" class="bg-white rounded-xl border border-gray-200 p-12 text-center">
      <div class="text-5xl mb-4">📅</div>
      <p class="text-gray-400 text-sm">填写左侧信息后，点击"查询面试官空闲时间"</p>
      <p class="text-gray-300 text-xs mt-1">系统将自动查询面试官的日历空闲时段</p>
    </div>

    <!-- 空闲时段列表（查询后显示） -->
    <div id="slotsPanel" class="hidden space-y-4">
      <div class="flex items-center justify-between">
        <h3 class="font-semibold text-gray-800">可用时段
          <span id="mockBadge" class="text-xs font-normal text-amber-500 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded-full ml-2">Mock 数据</span>
        </h3>
        <span id="selectedCount" class="text-sm text-gray-400">已选 0 个时段</span>
      </div>

      <div id="slotsList" class="grid grid-cols-1 gap-3"></div>

      <!-- 发送邮件按钮 -->
      <div id="sendPanel" class="hidden bg-white rounded-xl border border-gray-200 p-5">
        <h4 class="font-semibold text-gray-800 mb-3">发送选时邮件给候选人</h4>
        <div class="text-sm text-gray-500 mb-4">
          将向 <span id="previewEmail" class="text-red-500 font-medium"></span> 发送邮件，
          包含 <span id="previewSlotCount" class="font-medium text-gray-700"></span> 个备选时段。
        </div>
        <button onclick="sendInvite()"
          class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 rounded-lg
                 transition-colors flex items-center justify-center gap-2 text-sm">
          <span id="sendBtnIcon">✉️</span>
          <span id="sendBtnText">发送选时邮件</span>
        </button>
      </div>

      <!-- 发送成功提示 -->
      <div id="successPanel" class="hidden bg-green-50 border border-green-200 rounded-xl p-5">
        <div class="flex items-start gap-3">
          <span class="text-2xl">✅</span>
          <div>
            <p class="font-semibold text-green-800">邮件已发送！</p>
            <p class="text-sm text-green-600 mt-1" id="successMsg"></p>
            <div class="mt-3">
              <p class="text-xs text-green-600 mb-1">候选人选时链接（也可直接分享）：</p>
              <a id="selectUrlLink" href="#" target="_blank"
                 class="text-xs text-blue-500 hover:underline break-all"></a>
            </div>
          </div>
        </div>
      </div>

      <!-- 警告提示（SMTP 未配置） -->
      <div id="warningPanel" class="hidden bg-amber-50 border border-amber-200 rounded-xl p-5">
        <div class="flex items-start gap-3">
          <span class="text-2xl">⚠️</span>
          <div>
            <p class="font-semibold text-amber-800">邮件未发送（SMTP 未配置）</p>
            <p class="text-sm text-amber-600 mt-1" id="warningMsg"></p>
            <div class="mt-3">
              <p class="text-xs text-amber-700 mb-1">可直接用此链接测试候选人选时页面：</p>
              <a id="warningUrlLink" href="#" target="_blank"
                 class="text-xs text-blue-500 hover:underline break-all"></a>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- 约面记录抽屉 -->
<div id="historyDrawer" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-black/30" onclick="closeHistory()"></div>
  <div class="absolute right-0 top-0 bottom-0 w-[480px] bg-white shadow-2xl flex flex-col">
    <div class="flex items-center justify-between px-6 py-4 border-b">
      <h3 class="font-semibold text-gray-800">📋 约面记录</h3>
      <button onclick="closeHistory()" class="text-gray-400 hover:text-gray-700 text-xl">✕</button>
    </div>
    <div id="historyList" class="flex-1 overflow-auto p-4 space-y-3 text-sm text-gray-600">
      <p class="text-center text-gray-300 py-8">加载中...</p>
    </div>
  </div>
</div>

<script>
// ── 状态 ──
let interviewers = [];
let slots = [];
let selectedSlots = [];

// ── 面试官 Tag 管理 ──
document.getElementById("interviewerInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    const val = this.value.trim();
    if (val && !interviewers.includes(val)) {
      interviewers.push(val);
      renderTags();
    }
    this.value = "";
  }
});

function renderTags() {
  const container = document.getElementById("interviewerTags");
  container.innerHTML = interviewers.map((name, i) =>
    `<span class="tag">${name}<span class="remove" onclick="removeInterviewer(${i})">✕</span></span>`
  ).join("");
}

function removeInterviewer(idx) {
  interviewers.splice(idx, 1);
  renderTags();
}

// ── 查询空闲时段 ──
async function queryAvailability() {
  const candidateName = document.getElementById("candidateName").value.trim();
  const candidateEmail = document.getElementById("candidateEmail").value.trim();

  if (!candidateName || !candidateEmail) {
    alert("请先填写候选人姓名和邮箱");
    return;
  }
  if (interviewers.length === 0) {
    alert("请至少添加一位面试官");
    return;
  }

  setQueryLoading(true);
  try {
    const res = await fetch("/api/query-availability", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        interviewers,
        duration_min: parseInt(document.getElementById("durationMin").value),
        time_range: document.getElementById("timeRange").value
      })
    });
    const data = await res.json();
    slots = data.slots || [];
    selectedSlots = [];
    renderSlots();
    document.getElementById("emptyState").classList.add("hidden");
    document.getElementById("slotsPanel").classList.remove("hidden");
    document.getElementById("successPanel").classList.add("hidden");
    document.getElementById("warningPanel").classList.add("hidden");
  } catch(e) {
    alert("查询失败：" + e.message);
  }
  setQueryLoading(false);
}

function setQueryLoading(loading) {
  const btn = document.getElementById("queryBtn");
  document.getElementById("queryBtnIcon").textContent = loading ? "⏳" : "🔍";
  document.getElementById("queryBtnText").textContent = loading ? "查询中..." : "查询面试官空闲时间";
  btn.disabled = loading;
  btn.classList.toggle("opacity-60", loading);
}

function renderSlots() {
  const list = document.getElementById("slotsList");
  list.innerHTML = slots.map((slot, i) => `
    <div class="slot-card bg-white border border-gray-200 rounded-xl p-4 flex items-center gap-4
                ${selectedSlots.includes(i) ? 'selected' : ''}"
         onclick="toggleSlot(${i})">
      <div class="w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0
                  ${selectedSlots.includes(i) ? 'border-red-400 bg-red-400' : 'border-gray-300'}">
        ${selectedSlots.includes(i) ? '<svg viewBox="0 0 10 8" fill="none" class="w-3 h-3"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
      </div>
      <div class="flex-1">
        <div class="font-medium text-gray-800 text-sm">${slot.label}</div>
        <div class="text-xs text-gray-400 mt-0.5">面试官：${slot.interviewers.join("、")}</div>
      </div>
      <div class="text-xs px-2 py-1 rounded-full ${selectedSlots.includes(i) ? 'bg-red-100 text-red-500' : 'bg-green-50 text-green-500 border border-green-200'}">
        ${selectedSlots.includes(i) ? '已选' : '空闲'}
      </div>
    </div>
  `).join("");
  updateSelectedCount();
}

function toggleSlot(idx) {
  const pos = selectedSlots.indexOf(idx);
  if (pos === -1) selectedSlots.push(idx);
  else selectedSlots.splice(pos, 1);
  renderSlots();
}

function updateSelectedCount() {
  const n = selectedSlots.length;
  document.getElementById("selectedCount").textContent = `已选 ${n} 个时段`;
  const sendPanel = document.getElementById("sendPanel");
  if (n > 0) {
    sendPanel.classList.remove("hidden");
    document.getElementById("previewEmail").textContent = document.getElementById("candidateEmail").value;
    document.getElementById("previewSlotCount").textContent = n;
  } else {
    sendPanel.classList.add("hidden");
  }
}

// ── 发送邮件 ──
async function sendInvite() {
  const sendBtn = document.getElementById("sendBtnText");
  const sendIcon = document.getElementById("sendBtnIcon");
  sendBtn.textContent = "发送中...";
  sendIcon.textContent = "⏳";

  const chosenSlots = selectedSlots.map(i => slots[i]);

  try {
    const res = await fetch("/api/send-invite", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        candidate_name: document.getElementById("candidateName").value.trim(),
        candidate_email: document.getElementById("candidateEmail").value.trim(),
        candidate_link: document.getElementById("candidateLink").value.trim(),
        interviewers,
        duration_min: parseInt(document.getElementById("durationMin").value),
        interview_type: document.getElementById("interviewType").value,
        selected_slots: chosenSlots
      })
    });
    const data = await res.json();

    if (data.success) {
      // 邮件发送成功
      document.getElementById("sendPanel").classList.add("hidden");
      document.getElementById("successPanel").classList.remove("hidden");
      document.getElementById("successMsg").textContent =
        `邮件已发送至 ${document.getElementById("candidateEmail").value}，等候选人选时后会自动记录。`;
      const link = document.getElementById("selectUrlLink");
      link.href = data.select_url;
      link.textContent = data.select_url;
    } else if (data.warning) {
      // SMTP 未配置，显示警告 + 测试链接
      document.getElementById("sendPanel").classList.add("hidden");
      document.getElementById("warningPanel").classList.remove("hidden");
      document.getElementById("warningMsg").textContent = data.warning;
      const link = document.getElementById("warningUrlLink");
      link.href = data.select_url;
      link.textContent = data.select_url;
    } else {
      alert("发送失败：" + (data.error || "未知错误"));
    }
  } catch(e) {
    alert("发送失败：" + e.message);
  }

  sendBtn.textContent = "发送选时邮件";
  sendIcon.textContent = "✉️";
}

// ── 约面记录 ──
const STATUS_MAP = { draft:"草稿", sent:"已发送", confirmed:"候选人已选时", scheduled:"已建会" };
const STATUS_COLOR = { draft:"gray", sent:"blue", confirmed:"amber", scheduled:"green" };

async function showHistory() {
  document.getElementById("historyDrawer").classList.remove("hidden");
  const res = await fetch("/api/interviews");
  const data = await res.json();
  const list = document.getElementById("historyList");
  if (!data.length) {
    list.innerHTML = '<p class="text-center text-gray-300 py-8">暂无约面记录</p>';
    return;
  }
  list.innerHTML = data.map(item => {
    const color = STATUS_COLOR[item.status] || "gray";
    const statusLabel = STATUS_MAP[item.status] || item.status;
    return `
      <div class="bg-white border border-gray-100 rounded-xl p-4">
        <div class="flex items-start justify-between gap-2">
          <div>
            <span class="font-medium text-gray-800">${item.candidate_name}</span>
            <span class="text-gray-400 ml-2 text-xs">${item.candidate_email}</span>
          </div>
          <span class="text-xs px-2 py-0.5 rounded-full bg-${color}-50 text-${color}-600 border border-${color}-200 whitespace-nowrap">
            ${statusLabel}
          </span>
        </div>
        <div class="mt-2 text-xs text-gray-400">
          面试官：${item.interviewers.join("、")} · ${item.duration_min}分钟
        </div>
        ${item.confirmed_slot ? `
          <div class="mt-2 text-xs text-green-600 bg-green-50 rounded px-2 py-1">
            ✅ 已选：${item.confirmed_slot.label || ""}
          </div>` : ""}
        <div class="mt-2 text-xs text-gray-300">${item.created_at}</div>
      </div>
    `;
  }).join("");
}

function closeHistory() {
  document.getElementById("historyDrawer").classList.add("hidden");
}
</script>
</body>
</html>
