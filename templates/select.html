<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>选择面试时间 - 小红书</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-red-50 to-pink-50 flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <!-- 卡片 -->
  <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
    <!-- 头部 -->
    <div class="bg-gradient-to-r from-red-500 to-pink-500 px-6 py-8 text-center">
      <div class="text-4xl mb-3">🗓️</div>
      <h1 class="text-white text-xl font-bold">选择面试时间</h1>
      <p class="text-red-100 text-sm mt-1">小红书招聘团队</p>
    </div>

    <div id="mainContent" class="px-6 py-6">
      <p class="text-gray-600 text-sm mb-1">您好，<strong class="text-gray-800">{{ interview.candidate_name }}</strong>！</p>
      <p class="text-gray-500 text-sm mb-6">请从以下时间段中选择一个您方便的面试时间：</p>

      {% if interview.status == 'confirmed' %}
      <!-- 已选过了 -->
      <div class="bg-green-50 border border-green-200 rounded-xl p-5 text-center">
        <div class="text-3xl mb-2">✅</div>
        <p class="text-green-700 font-semibold">您已完成选时</p>
        <p class="text-green-600 text-sm mt-1">HR 会尽快确认并发送日历邀请，请留意邮件</p>
      </div>
      {% else %}
      <!-- 时间选择 -->
      <div id="slotList" class="space-y-3 mb-6">
        {% for slot in slots %}
        <label class="slot-option block cursor-pointer">
          <input type="radio" name="slot" value="{{ loop.index0 }}" class="sr-only" />
          <div class="border-2 border-gray-200 rounded-xl p-4 transition-all hover:border-red-300 hover:bg-red-50
                      flex items-center gap-3 peer-checked:border-red-500">
            <div class="radio-dot w-5 h-5 rounded-full border-2 border-gray-300 flex-shrink-0
                        flex items-center justify-center transition-all">
              <div class="inner w-2.5 h-2.5 rounded-full bg-red-500 scale-0 transition-transform"></div>
            </div>
            <div>
              <div class="font-medium text-gray-800 text-sm">{{ slot.label }}</div>
            </div>
          </div>
        </label>
        {% endfor %}
      </div>

      <button id="confirmBtn" onclick="confirmSlot()"
        class="w-full bg-red-500 hover:bg-red-600 text-white font-semibold py-3 rounded-xl
               transition-colors text-sm flex items-center justify-center gap-2 disabled:opacity-40"
        disabled>
        <span id="confirmIcon">✓</span>
        <span id="confirmText">确认选择</span>
      </button>
      {% endif %}
    </div>

    <!-- 底部 -->
    <div class="px-6 pb-6 pt-2 border-t border-gray-50">
      <p class="text-xs text-gray-400 text-center">
        如有疑问，请回复邮件联系 HR · jisiming@xiaohongshu.com
      </p>
    </div>
  </div>

  <p class="text-center text-xs text-gray-400 mt-4">小红书招聘团队</p>
</div>

<style>
  .slot-option input:checked ~ div { border-color: #f43f5e; background: #fff1f2; }
  .slot-option input:checked ~ div .radio-dot { border-color: #f43f5e; }
  .slot-option input:checked ~ div .radio-dot .inner { transform: scale(1); }
</style>

<script>
const slots = {{ slots | tojson }};
const token = "{{ token }}";
let selectedIdx = null;

// 监听 radio 选择
document.querySelectorAll('input[name="slot"]').forEach(function(radio) {
  radio.addEventListener("change", function() {
    selectedIdx = parseInt(this.value);
    document.getElementById("confirmBtn").disabled = false;
  });
});

async function confirmSlot() {
  if (selectedIdx === null) return;

  document.getElementById("confirmIcon").textContent = "⏳";
  document.getElementById("confirmText").textContent = "提交中...";
  document.getElementById("confirmBtn").disabled = true;

  try {
    const res = await fetch("/api/confirm-slot", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: token, slot: slots[selectedIdx].iso })
    });
    const data = await res.json();

    if (data.success) {
      document.getElementById("mainContent").innerHTML = `
        <div class="text-center py-4">
          <div class="text-5xl mb-4">🎉</div>
          <h2 class="text-gray-800 font-bold text-lg mb-2">已收到您的选择！</h2>
          <div class="bg-red-50 border border-red-100 rounded-xl p-4 mb-4 text-left">
            <p class="text-sm text-gray-500 mb-1">您选择的面试时间：</p>
            <p class="font-semibold text-red-600">${data.confirmed_slot_label}</p>
          </div>
          <p class="text-gray-500 text-sm">${data.message}</p>
        </div>
      `;
    } else {
      alert(data.error || "提交失败，请重试");
      document.getElementById("confirmIcon").textContent = "✓";
      document.getElementById("confirmText").textContent = "确认选择";
      document.getElementById("confirmBtn").disabled = false;
    }
  } catch(e) {
    alert("网络错误：" + e.message);
    document.getElementById("confirmIcon").textContent = "✓";
    document.getElementById("confirmText").textContent = "确认选择";
    document.getElementById("confirmBtn").disabled = false;
  }
}
</script>
</body>
</html>
